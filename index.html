<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dallas England Photography</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1>Dallas England Photography</h1>
    <p class="intro">Landscapes, light, form, and shadow.</p>
  </header>

  <main class="gallery">

    <figure class="photo-card">
      <img src="images/photo1.jpg" alt="Landscape photograph 1">
      <figcaption>
        <h2>British Columbia West Coast</h2>
        <p class="meta"></p>
        <p></p>
      </figcaption>
    </figure>

    <figure class="photo-card">
      <img src="images/photo2.jpg" alt="Landscape photograph 2">
      <figcaption>
        <h2>Moonrise over Cascades</h2>
        <p class="meta"></p>
        <p></p>
      </figcaption>
    </figure>

    <figure class="photo-card">
      <img src="images/photo3.JPG" alt="Landscape photograph 3">
      <figcaption>
        <h2>Gibsons Landing</h2>
        <p class="meta">British Columbia</p>
        <p></p>
      </figcaption>
    </figure>

    <figure class="photo-card">
      <img src="images/photo4.jpg" alt="Landscape photograph 4">
      <figcaption>
        <h2>Glacial Trace</h2>
        <p class="meta">South Thompson Valley, BC</p>
        <p>Subtle ridges in the land hint at the glacial forces that shaped this valley.</p>
      </figcaption>
    </figure>

  </main>

  <div id="lightbox">
    <span id="close">&times;</span>
    <img id="lightbox-img" src="" alt="Expanded photograph">
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const images = document.querySelectorAll(".photo-card img");
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const closeBtn = document.getElementById("close");

      images.forEach(function (img) {
        img.addEventListener("click", function () {
          lightboxImg.src = img.src;
          lightbox.style.display = "flex";
        });
      });

      closeBtn.addEventListener("click", function () {
        lightbox.style.display = "none";
      });

      lightbox.addEventListener("click", function (e) {
        if (e.target !== lightboxImg) {
          lightbox.style.display = "none";
        }
      });
    });
  </script>

</body>
</html>
